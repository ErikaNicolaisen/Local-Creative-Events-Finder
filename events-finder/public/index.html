<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Creative Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="controls">
    <input type="text" id="search-input" placeholder="Search events...">
    <div id="filters">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="lighting">Lighting</button>
      <button class="filter-btn" data-category="sound">Sound</button>
      <button class="filter-btn" data-category="photography">Photography</button>
      <button class="filter-btn" data-category="stage">Stage</button>
      <button class="filter-btn" data-category="dj">DJ</button>
      <button class="filter-btn" data-category="video">Video</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="app.js"></script>
  <script src="event.js"></script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDlgJkuLFPCYF61ul8YEl7IEzxwGDEFzP8&callback=initMap"></script>

</body>
</html>
