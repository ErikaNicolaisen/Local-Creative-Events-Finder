<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StageUp Copenhagen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="bg-map"></div>
  <div class="overlay"></div>

  <div class="content">
    <h1>StageUp<br>Copenhagen</h1>
    <p class="tagline">Find volunteer shifts at Copenhagen's best festivals and venues. This will strengthen your abilities and expand your network!<br>Choose the categories below or go to all events:</p>

    <div class="category-row">
      <button class="cat-btn" onclick="goToMap('stage')">Stage</button>
      <button class="cat-btn" onclick="goToMap('sound')">Sound</button>
      <button class="cat-btn" onclick="goToMap('lighting')">Lighting</button>
      <button class="cat-btn" onclick="goToMap('photography')">Photography</button>
    </div>

    <a href="map.html" class="go-btn">GO TO ALL EVENTS</a>
    <span class="divider">or</span>
    <a href="create.html" class="submit-link">Sign up a volunteer shift</a>
  </div>

  <script src="landing.js"></script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDlgJkuLFPCYF61ul8YEl7IEzxwGDEFzP8&callback=initBgMap"></script>
</body>
</html>
