<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Creative Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="controls">
    <input type="text" id="search-input" placeholder="Search events...">
    <div id="filters">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="workshop">Workshop</button>
      <button class="filter-btn" data-category="market">Market</button>
      <button class="filter-btn" data-category="exhibition">Exhibition</button>
    </div>
  </div>

  <div id="map"></div>

  <script src="app.js"></script>
</body>
</html>
