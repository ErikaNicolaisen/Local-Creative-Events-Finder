<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Local Creative Events</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <button id="sidebar-toggle">☰</button>

  <div id="sidebar">
    <a href="index.html">← Frontpage</a>
    <a href="about.html">About StageUp</a>
    <a href="create.html">+ Post Opportunity</a>
    <h3 style="margin-top:8px;">📝 My Posted Events</h3>
    <div id="user-events-list"></div>
    <h3>❤️ Liked Events</h3>
    <div id="liked-list"></div>
  </div>

  <div id="controls">
    <input type="text" id="search-input" placeholder="Search events...">
    <div id="filters">
      <button class="filter-btn active" data-category="all">All</button>
      <button class="filter-btn" data-category="lighting">Lighting</button>
      <button class="filter-btn" data-category="sound">Sound</button>
      <button class="filter-btn" data-category="photography">Photography</button>
      <button class="filter-btn" data-category="stage">Stage</button>
    </div>
  </div>

  <div id="map"></div>

  <script>
    document.getElementById('sidebar-toggle').addEventListener('click', () => {
      document.getElementById('sidebar').classList.toggle('open')
    })
  </script>
  <script src="app.js"></script>
  <script async src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDlgJkuLFPCYF61ul8YEl7IEzxwGDEFzP8&callback=initMap"></script>
</body>
</html>
